server {
    listen 80;
    server_name localhost;

    # 字符集
    charset utf-8;

    # 前端静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1k;
    gzip_vary on;
    gzip_comp_level 6;

    # 前端路由：所有非文件/非 API 请求都返回 index.html（支持 Vue Router history 模式）
    location / {
        try_files $uri $uri/ /index.html;

        # 缓存策略：HTML 不缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 静态资源缓存（JS/CSS/图片等）
    location /static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 反向代理
    location /wzsys/ {
        # 代理到后端 Mock 服务（容器内或宿主机）
        # 根据实际部署环境修改此处地址
        # - 宿主机上运行的后端：proxy_pass http://host.docker.internal:3000;
        # - 同 docker-compose 中的服务：proxy_pass http://server:3000;
        # - 远程服务器：proxy_pass http://your-server:3000;
        proxy_pass http://host.docker.internal:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（后续可能用到）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    # 错误页面
    error_page 404 /index.html;
}