name: Build and Deploy
run-name: Build and Deploy by ${{ gitea.actor }}

on:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: node:20-alpine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ==========================================
      # @hx 私有包 registry 配置
      # 注意：工作流容器内无法访问 localhost:4873
      # 需改为宿主机 IP 或 host.docker.internal
      # ==========================================
      - name: Setup npm registry for private packages
        run: |
          # host.docker.internal 指向宿主机（Windows）
          echo "@hx:registry=http://host.docker.internal:4873/" > .npmrc
          echo "//registry.npmjs.org/:_authToken=" >> .npmrc

      # ==========================================
      # 缓存 node_modules，避免每次重新下载
      # ==========================================
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          key: node-modules-${{ hashFiles('package-lock.json') }}
          path: node_modules
          restore-keys: |
            node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # ==========================================
      # 将 dist 复制到共享部署目录
      # 该目录挂载了宿主机的路径，Nginx 容器也挂载同一路径
      # ==========================================
      - name: Copy dist to deploy directory
        run: |
          # 先清空原有文件
          rm -rf /var/www/html/*
          # 复制新构建产物
          cp -r dist/* /var/www/html/
          # 保留 nginx.conf 供 nginx 容器使用（可选）
          echo "Deploy completed at $(date)" > /var/www/html/deploy-info.txt

      - name: List deployed files
        run: ls -la /var/www/html/