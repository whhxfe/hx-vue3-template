name: Build and Deploy
run-name: Build and Deploy by ${{ gitea.actor }}

on:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: node:20-alpine

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup npm registry
        run: |
          # 如果 @hx 私有 registry 在宿主机上，容器内需要通过 host.docker.internal 访问
          # 如需调整，请修改下面的 registry 地址
          echo "@hx:registry=https://registry.npmjs.org" > .npmrc
          echo "//registry.npmjs.org/:_authToken=" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: List dist files
        run: ls -la dist/

      # 打包构建产物为 artifact
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      # 构建 Docker 镜像并推送
      - name: Login to Docker registry (if needed)
        if: false  # 暂时禁用，后续启用
        run: echo "docker login ..."

      - name: Build Docker image
        run: |
          docker build -t hx-vue3-template:latest .
          docker tag hx-vue3-template:latest hx-vue3-template:${{ gitea.sha }}

      # 部署到远程服务器（通过 SSH）
      - name: Deploy to remote server
        if: false  # 暂时禁用，后续根据实际部署环境启用
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          # 示例：通过 SSH 部署到远程服务器
          # ssh -i key $DEPLOY_USER@$DEPLOY_HOST "
          #   docker pull hx-vue3-template:latest && 
          #   docker stop hx-nginx || true && 
          #   docker rm hx-nginx || true && 
          #   docker run -d --name hx-nginx -p 8080:80 hx-vue3-template:latest
          # "
          echo "Deploy step - configure later"