name: Build and Deploy
run-name: Build and Deploy by ${{ gitea.actor }}

on:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      # 当前试点阶段：先用 Docker Hub 镜像
      # ★ 迁移到纯内网时改为：registry:5000/node:20-alpine
      #   并配置 Docker daemon.json:
      #   { "insecure-registries": ["registry:5000"] }
      image: node:20-alpine

    steps:
      # ==========================================
      # 内网方案：通过 Gitea API 克隆代码
      # 不依赖 actions/checkout@v4
      # ==========================================
      - name: Checkout code via Gitea
        run: |
          apk add --no-cache git
          git clone http://gitea:3000/${{ gitea.repository }}.git .
          git checkout ${{ gitea.sha }}

      # ==========================================
      # @hx 私有包 registry 配置
      # 内网通过容器名访问 verdaccio（同属 gitea-net 网络）
      # ==========================================
      - name: Setup npm registry
        run: |
          # @hx 私有包从 verdaccio 获取
          echo "@hx:registry=http://verdaccio:4873/" > .npmrc
          # 公共包从内网 npm 镜像获取（如果有的话）
          # echo "registry=http://npm-mirror:8081/repository/npm-public/" >> .npmrc

      # ==========================================
      # 内网缓存：将 node_modules 打包到共享目录
      # 不依赖 actions/cache@v4
      # ==========================================
      - name: Restore node_modules cache
        run: |
          if [ -f /var/www/html/.cache/node_modules.tar.gz ]; then
            echo "Found cached node_modules, restoring..."
            tar -xzf /var/www/html/.cache/node_modules.tar.gz -C /workspace/${{ gitea.repository }}/
          else
            echo "No cache found, will install fresh dependencies"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        run: |
          mkdir -p /var/www/html/.cache
          tar -czf /var/www/html/.cache/node_modules.tar.gz node_modules
          echo "node_modules cached successfully"

      - name: Build project
        run: npm run build

      # ==========================================
      # 部署到共享目录（Nginx 读取此目录）
      # ==========================================
      - name: Copy dist to deploy directory
        run: |
          # 清空原有文件（保留 .cache 目录）
          find /var/www/html/ -maxdepth 1 ! -name '.cache' ! -name '/var/www/html/' -exec rm -rf {} +
          # 复制新构建产物
          cp -r dist/* /var/www/html/
          echo "Deploy completed at $(date)" > /var/www/html/deploy-info.txt

      - name: List deployed files
        run: ls -la /var/www/html/